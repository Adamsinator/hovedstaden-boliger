name: Update housing data

on:
  schedule:
    - cron: "17 4 * * *"   # daily 04:17 UTC (~06:17 CET)
  workflow_dispatch: {}      # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: build-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull listings from boligsiden.dk
        run: python3 scripts/build_data.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/listings.json data/meta.json
          if git diff --cached --quiet; then
            echo "No changes in listings — nothing to commit."
          else
            git commit -m "Update housing data ($(date -u +%Y-%m-%d))"
            git push
          fi
